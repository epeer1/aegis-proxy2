version: '3.8'

services:
  proxy:
    image: node:20-alpine
    working_dir: /usr/src/app
    volumes:
      - ./apps/proxy:/usr/src/app
    command: sh -c "npm install && npm start"
    ports:
      - "3001:3001"
    env_file:
      - ./apps/proxy/.env
    environment:
      - PORT=3001

  dashboard:
    image: node:20-alpine
    working_dir: /usr/src/app
    volumes:
      - ./apps/dashboard:/usr/src/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - ./apps/dashboard/.env.local
